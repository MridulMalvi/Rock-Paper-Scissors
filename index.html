<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header> 
    <h1>Rock Paper Scissors Game</h1>
    <button id="mode">Dark Mode</button>
  </header>
<br>
  <div class="choices">
    <div class="choice" id="rock"><img src="rock.jpg"></div>
    <div class="choice" id="paper"><img src="paper.jpg"></div>
    <div class="choice" id="scissors"><img src="scissor.jpg"></div>
  </div>

  <br>
  <div class="scoreboard">
    <div class="score"><p>User</p>
      <p id="user">0</p></div>
    <div class="score"><p>Bot</p>
      <p id="computer">0</p></div>
  </div>
<br>
  <div class="message-container">
    <p class="msg">Play your move!</p>
  </div>

  <!-- Replay button hidden initially -->
  <div class="replay-container">
    <button id="replay" style="display:none;">Replay Game 🔁</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
